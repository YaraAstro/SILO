<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Access Blocked - SILO</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600;800;900&display=swap" rel="stylesheet">
  <style>
    :root {
      --bg-color: #0b0f19;
      --card-bg: #111827;
      --accent-color: #14b8a6; /* teal-500 */
      --text-main: #f3f4f6;
      --text-muted: #9ca3af;
      --border-color: #1f2937;
    }
    
    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    body {
      background-color: var(--bg-color);
      color: var(--text-main);
      font-family: 'Outfit', sans-serif;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 24px;
      overflow: hidden;
      position: relative;
    }

    /* Cosmic background elements */
    body::before {
      content: "";
      position: absolute;
      width: 400px;
      height: 400px;
      background: radial-gradient(circle, rgba(20, 184, 166, 0.1) 0%, rgba(20, 184, 166, 0) 70%);
      top: -100px;
      right: -100px;
      z-index: 0;
    }

    body::after {
      content: "";
      position: absolute;
      width: 400px;
      height: 400px;
      background: radial-gradient(circle, rgba(239, 68, 68, 0.05) 0%, rgba(239, 68, 68, 0) 70%);
      bottom: -100px;
      left: -100px;
      z-index: 0;
    }

    .container {
      max-w: 520px;
      width: 100%;
      background-color: rgba(17, 24, 39, 0.8);
      border: 1px solid var(--border-color);
      backdrop-filter: blur(12px);
      padding: 48px 32px;
      border-radius: 24px;
      text-align: center;
      box-shadow: 0 20px 25px -5px rgba(0, 0, 0, 0.5), 0 10px 10px -5px rgba(0, 0, 0, 0.04);
      z-index: 10;
      animation: scaleIn 0.4s cubic-bezier(0.16, 1, 0.3, 1) both;
    }

    .icon-container {
      width: 80px;
      height: 80px;
      background: rgba(20, 184, 166, 0.1);
      border: 1px solid rgba(20, 184, 166, 0.25);
      border-radius: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
      margin: 0 auto 32px;
      color: var(--accent-color);
      animation: pulseTeal 2s infinite ease-in-out;
    }

    .lock-icon {
      width: 36px;
      height: 36px;
      fill: currentColor;
    }

    h1 {
      font-size: 32px;
      font-weight: 900;
      letter-spacing: -0.5px;
      margin-bottom: 16px;
      background: linear-gradient(135deg, #ffffff 0%, #a5f3fc 100%);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
    }

    p.description {
      font-size: 16px;
      color: var(--text-muted);
      line-height: 1.6;
      margin-bottom: 32px;
    }

    .quote-box {
      background: rgba(255, 255, 255, 0.02);
      border: 1px dashed var(--border-color);
      padding: 20px;
      border-radius: 16px;
      margin-bottom: 32px;
      position: relative;
    }

    .quote {
      font-style: italic;
      color: #e5e7eb;
      font-size: 15px;
      line-height: 1.5;
    }

    .author {
      font-size: 12px;
      color: var(--accent-color);
      margin-top: 8px;
      font-weight: 600;
      text-transform: uppercase;
      letter-spacing: 1px;
    }

    .badge {
      display: inline-flex;
      align-items: center;
      gap: 6px;
      background: rgba(239, 68, 68, 0.1);
      border: 1px solid rgba(239, 68, 68, 0.2);
      color: #fca5a5;
      padding: 6px 16px;
      border-radius: 9999px;
      font-size: 12px;
      font-weight: 600;
      letter-spacing: 0.5px;
      text-transform: uppercase;
      margin-bottom: 24px;
    }

    .button {
      background-color: var(--accent-color);
      color: #0b0f19;
      padding: 12px 32px;
      border-radius: 12px;
      font-weight: 800;
      text-decoration: none;
      display: inline-block;
      transition: all 0.2s ease-in-out;
      box-shadow: 0 4px 14px 0 rgba(20, 184, 166, 0.3);
      cursor: pointer;
    }

    .button:hover {
      background-color: #0d9488; /* teal-600 */
      transform: translateY(-2px);
      box-shadow: 0 6px 20px 0 rgba(20, 184, 166, 0.4);
    }

    .button:active {
      transform: translateY(0);
    }

    @keyframes scaleIn {
      from {
        transform: scale(0.95);
        opacity: 0;
      }
      to {
        transform: scale(1);
        opacity: 1;
      }
    }

    @keyframes pulseTeal {
      0%, 100% {
        transform: scale(1);
        box-shadow: 0 0 0 0 rgba(20, 184, 166, 0.4);
      }
      50% {
        transform: scale(1.05);
        box-shadow: 0 0 20px 4px rgba(20, 184, 166, 0.2);
      }
    }
  </style>
</head>
<body>
  <div class="container">
    <div class="badge">
      <svg style="width:14px;height:14px;fill:currentColor;margin-right:2px;" viewBox="0 0 24 24">
        <path d="M12 2C6.48 2 2 6.48 2 12s4.48 10 10 10 10-4.48 10-10S17.52 2 12 2zm1 15h-2v-6h2v6zm0-8h-2V7h2v2z"/>
      </svg>
      Focus Mode Active
    </div>
    
    <div class="icon-container">
      <svg class="lock-icon" viewBox="0 0 24 24">
        <path d="M18 8h-1V6c0-2.76-2.24-5-5-5S7 3.24 7 6v2H6c-1.1 0-2 .9-2 2v10c0 1.1.9 2 2 2h12c1.1 0 2-.9 2-2V10c0-1.1-.9-2-2-2zm-6 9c-1.1 0-2-.9-2-2s.9-2 2-2 2 .9 2 2-.9 2-2 2zm3.1-9H8.9V6c0-1.71 1.39-3.1 3.1-3.1 1.71 0 3.1 1.39 3.1 3.1v2z"/>
      </svg>
    </div>

    <h1>Access Blocked by SILO</h1>
    <p class="description">This website was locked because your daily focus limit has been reached. Time to step away and double down on what matters.</p>

    <div class="quote-box">
      <p class="quote">"Focus is a muscle, and you are building it right now."</p>
      <p class="author">SILO Focus Guide</p>
    </div>

    <a href="https://google.com" class="button">Go Home</a>
  </div>
</body>
</html>
